name: Logistics Service CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'logistics-service/**'
      - '.github/workflows/logistics-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'logistics-service/**'
      - '.github/workflows/logistics-ci.yml'

defaults:
  run:
    working-directory: logistics-service

jobs:

  # 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Run ktlint
        run: ./gradlew ktlintCheck

  # 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      # Pull the Ollama model image ahead of time so Testcontainers
      # doesn't time out waiting for the model download during tests.
      # The image is cached by Docker layer caching between runs.
      - name: Pre-pull Ollama image
        run: docker pull ollama/ollama:latest

      - name: Run tests
        env:
          # Testcontainers reads these to configure the Docker socket
          TESTCONTAINERS_RYUK_DISABLED: false
          # Spring AI tests use a real Ollama container, flag enables them
          SPRING_AI_TESTS_ENABLED: false
        run: ./gradlew test --info

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()   # run even if tests fail so you can see the report
        with:
          name: Kotlin Test Results
          path: logistics-service/build/test-results/test/*.xml
          reporter: java-junit

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: logistics-service/build/reports/jacoco/test/jacocoTestReport.xml
          flags: logistics-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [ lint, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant Gradle wrapper permission
        run: chmod +x gradlew

      - name: Build Spring Boot JAR
        run: ./gradlew bootJar -x test   # tests already ran in the test job

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/logistics-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: logistics-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
