name: Telemetry Service CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'telemetry-service/**'
      - '.github/workflows/telemetry-ci.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'telemetry-service/**'
      - '.github/workflows/telemetry-ci.yml'

defaults:
  run:
    working-directory: telemetry-service

jobs:

  # ── 1. Lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: telemetry-service/go.mod
          cache-dependency-path: telemetry-service/go.sum

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: telemetry-service
          args: --timeout=5m

  # ── 2. Test ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    # The Go service is stateless — it only publishes to RabbitMQ.
    # No database, no Redis needed here.
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: telemetry-service/go.mod
          cache-dependency-path: telemetry-service/go.sum

      - name: Run tests (with race detector)
        env:
          RABBITMQ_URL:    amqp://guest:guest@localhost:5672/
          API_KEYS:        test-key-001,test-key-002
          WORKER_COUNT:    10
          CHANNEL_BUFFER:  1000
        run: go test ./... -race -count=1 -coverprofile=coverage.txt -covermode=atomic

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: telemetry-service/coverage.txt
          flags: telemetry-service
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 3. Build ───────────────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [ lint, test ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        # Only push on merge to main — PRs only build to verify the Dockerfile
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/telemetry-service
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build (and push on main)
        uses: docker/build-push-action@v5
        with:
          context: telemetry-service
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
